server:
  address: ":8080"

llm:
  provider: "openai"
  base_url: "https://api.openai.com"
  api_key: ""
  model: "gpt-4o-mini"
  timeout_seconds: 30

memory:
  backend: "redis" # redis | in_memory
  redis_addr: "redis:6379"
  redis_db: 0
  redis_password: ""
  key_prefix: "agent"
  history_size: 20

agent:
  system_prompt: "你是电商平台的智能客服助手。请礼貌、简洁、可执行地回答用户问题。"
  knowledge_path: "configs/knowledge_base.json"
  knowledge_top_k: 3
